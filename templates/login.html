<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OrganizaJá</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
        }
        .login-container input {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            background: #121212;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            outline: none;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .erro {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>OrganizaJá</h1>
        <p style="margin-bottom: 20px; color: #888;">Acesso Restrito</p>
        
        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="text" name="usuario" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
